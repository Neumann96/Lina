name: Review reminders

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send due review reminders
        env:
          REVIEW_REMINDER_SECRET: ${{ secrets.REVIEW_REMINDER_SECRET }}
        run: |
          if [ -z "${REVIEW_REMINDER_SECRET:-}" ]; then
            echo "REVIEW_REMINDER_SECRET must be configured"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            --header "x-lina-reminder-secret: ${REVIEW_REMINDER_SECRET}" \
            https://lina-lern.ru/api/reviews/notify
