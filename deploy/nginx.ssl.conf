limit_req_zone $binary_remote_addr zone=lina_api:10m rate=15r/s;
limit_req_zone $binary_remote_addr zone=lina_health:1m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=lina_connections:10m;

upstream lina_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name lina-lern.ru www.lina-lern.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 308 https://lina-lern.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lina-lern.ru www.lina-lern.ru;

    ssl_certificate /etc/letsencrypt/live/lina-lern.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lina-lern.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:LinaTLS:10m;
    ssl_session_tickets off;

    server_tokens off;
    client_max_body_size 2m;
    client_header_timeout 10s;
    client_body_timeout 15s;
    send_timeout 60s;
    keepalive_timeout 30s;
    limit_conn lina_connections 30;
    limit_req_status 429;
    limit_conn_status 429;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        alias /opt/lina/current/.next/static/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /api/health {
        limit_req zone=lina_health burst=5 nodelay;
        proxy_pass http://lina_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_hide_header X-Powered-By;
    }

    location /api/ {
        limit_req zone=lina_api burst=40 nodelay;
        proxy_pass http://lina_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 180s;
        proxy_hide_header X-Powered-By;
    }

    location / {
        proxy_pass http://lina_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_hide_header X-Powered-By;
    }
}

